services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/klaava.db
      CORS_ORIGINS: http://localhost
    volumes:
      - klaava-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  klaava-data:
